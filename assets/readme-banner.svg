      <stop offset="0.38" stop-color="#8B5CF6" stop-opacity="0.14" />
      <stop offset="0.62" stop-color="#8B5CF6" stop-opacity="0.86" />
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0.00" />
    </linearGradient>
    <radialGradient id="purpleGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(844 120) rotate(0) scale(286 194)">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.70" />
